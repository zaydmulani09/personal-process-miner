<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Process Miner</title>
</head>
<body style="margin:0;padding:0;font-family:system-ui,sans-serif;background:#0f172a;color:#f8fafc;width:280px;">
  <div style="padding:16px 18px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:18px;">⚙</span>
      <span style="font-weight:700;font-size:15px;">Process Miner</span>
    </div>
    <p style="margin:0 0 16px;font-size:12px;color:#94a3b8;">Capture browser events for automation</p>

    <button id="toggleBtn" style="width:100%;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff;margin-bottom:10px;">
      ⏺ Start Recording
    </button>

    <div id="counter" style="font-size:12px;color:#94a3b8;text-align:center;margin-bottom:12px;">0 events captured</div>

    <button id="sendBtn" style="width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#10b981;color:#fff;">
      📤 Send to PPM
    </button>
    <div id="status" style="font-size:11px;color:#94a3b8;text-align:center;margin-top:8px;min-height:16px;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
