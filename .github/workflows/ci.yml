name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Run DB tests
        run: python sidecar/test_db.py

      - name: Run segmenter tests
        run: python sidecar/test_segmenter.py

      - name: Run fingerprinter tests
        run: python sidecar/test_fingerprinter.py

      - name: Run ranker tests
        run: python sidecar/test_ranker.py

      - name: Run LLM explainer tests
        run: python sidecar/test_llm_explainer.py

      - name: Run provider tests
        run: python sidecar/test_providers.py

      - name: Run accessibility tests
        run: python sidecar/test_accessibility.py
