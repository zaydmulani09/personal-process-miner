name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install MSVC build tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install pyinstaller

      - name: Build Python sidecar
        run: py -m PyInstaller --onefile --name ppm-sidecar --distpath src-tauri/binaries --paths sidecar sidecar/main.py

      - name: Rename sidecar binary for Tauri
        run: mv src-tauri/binaries/ppm-sidecar.exe src-tauri/binaries/ppm-sidecar-x86_64-pc-windows-msvc.exe

      - name: Install Node dependencies
        run: npm install

      - name: Build Tauri app (Windows)
        run: npm run tauri build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Build Tauri app (macOS)
        run: npm run tauri build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Personal Process Miner ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/* || true
